<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Tracker | TR Tools</title>
  <link rel="stylesheet" href="../../shared/css/base.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <a href="../../index.html">&larr; TR Tools</a>
    <h1>Attendance Tracker</h1>
  </header>

  <main>
    <div class="app-layout">

      <!-- ── Sidebar ───────────────────────────────────────────────────── -->
      <aside class="sidebar">

        <section class="sidebar-section">
          <h2 class="sidebar-section-title">Requirement</h2>
          <div class="req-toggle">
            <button class="req-btn" data-req="3" type="button">3 days</button>
            <button class="req-btn" data-req="4" type="button">4 days</button>
          </div>
        </section>

        <section class="sidebar-section">
          <div class="paint-mode-header">
            <h2 class="sidebar-section-title" id="paint-mode-title">Paint mode</h2>
            <button class="paint-btn paint-btn--eraser" data-status="none" type="button" aria-label="Eraser">
              <svg fill="#f472b6" width="14" height="14" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
                <path d="M216.001,211.833H120.6875l98.14258-98.1416a20.0237,20.0237,0,0,0-.001-28.28418L173.57422,40.15234a20.01987,20.01987,0,0,0-28.2832,0l-56.564,56.564-.00537.00439-.00439.00537-56.564,56.564a20.02163,20.02163,0,0,0,0,28.2832l37.08887,37.08789a4.00051,4.00051,0,0,0,2.82812,1.17188H216.001a4,4,0,0,0,0-8ZM150.94727,45.80859a12.0157,12.0157,0,0,1,16.9707,0l45.25488,45.25489a12.016,12.016,0,0,1,0,16.97168L159.43213,161.7749,97.20654,99.54932ZM109.37305,211.833H73.72754l-35.918-35.916a12.01392,12.01392,0,0,1,0-16.9707l53.74072-53.74072,62.22559,62.22558Z"/>
              </svg>
            </button>
          </div>
          <div class="paint-options">
            <button class="paint-btn" data-status="in-office" type="button">In Office</button>
            <button class="paint-btn" data-status="remote"    type="button">Remote</button>
            <button class="paint-btn" data-status="ooo"       type="button">OOO</button>
            <button class="paint-btn" data-status="holiday"   type="button">Holiday</button>
          </div>
        </section>

        <section class="sidebar-section">
          <div class="section-title-row">
            <h2 class="sidebar-section-title">This month</h2>
            <div class="info-icon" data-tooltip="OOO days should be used for Sick days, Vacation Days, and Work from Anywhere days.">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 16v-4"/>
                <path d="M12 8h.01"/>
              </svg>
            </div>
          </div>

          <div class="stat-list">
            <div class="stat-row">
              <span class="stat-dot dot-in-office"></span>
              <span class="stat-name">In office</span>
              <span class="stat-value" id="stat-in-office">0</span>
            </div>
            <div class="stat-row">
              <span class="stat-dot dot-remote"></span>
              <span class="stat-name">Remote</span>
              <span class="stat-value" id="stat-remote">0</span>
            </div>
            <div class="stat-row">
              <span class="stat-dot dot-ooo"></span>
              <span class="stat-name">OOO</span>
              <span class="stat-value" id="stat-ooo">0</span>
            </div>
            <div class="stat-row">
              <span class="stat-dot dot-holiday"></span>
              <span class="stat-name">Holiday</span>
              <span class="stat-value" id="stat-holiday">0</span>
            </div>
          </div>

          <div class="stat-divider"></div>

          <div class="stat-list">
            <div class="stat-row">
              <span class="stat-name">Current</span>
              <span class="stat-value" id="stat-avg">—</span>
            </div>
            <div class="stat-row">
              <span class="stat-name">Target</span>
              <span class="stat-value" id="stat-target">3 days / week</span>
            </div>
            <div class="stat-row">
              <span class="stat-name">Status</span>
              <span class="badge badge-neutral" id="stat-status-badge">No data</span>
            </div>
          </div>
        </section>

      </aside>

      <!-- ── Calendar ──────────────────────────────────────────────────── -->
      <div class="calendar-card" id="calendar-card">

        <div class="calendar-nav">
          <button id="btn-prev" type="button" class="nav-btn" aria-label="Previous month">&#8249;</button>
          <span id="month-label" class="month-label"></span>
          <button id="btn-next" type="button" class="nav-btn" aria-label="Next month">&#8250;</button>
        </div>

        <div class="day-name-row">
          <span>Mon</span>
          <span>Tue</span>
          <span>Wed</span>
          <span>Thu</span>
          <span>Fri</span>
        </div>

        <div id="calendar-grid" class="calendar-grid"></div>

      </div>

      <div class="calendar-actions">
        <button id="btn-import-holidays" type="button" class="import-holidays-btn">Import holidays</button>
        <button id="btn-clear-month"     type="button" class="clear-month-btn">Clear month</button>
      </div>

    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
